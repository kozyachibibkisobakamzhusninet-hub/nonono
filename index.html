<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nonono</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            background: #000;
            overflow: hidden;
        }

        body {
            position: relative;
        }

        .pixel {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 1px;
            height: 1px;
            background: #ff0000;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div class="pixel" aria-hidden="true"></div>
</body>
</html>
